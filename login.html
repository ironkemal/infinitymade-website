<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="googlebot" content="noindex, nofollow" />
  <title>Login — InfinityMade</title>
  <!-- Sentry error tracking -->
  <script src="https://js-de.sentry-cdn.com/1247311e4965725138bca7ddb32101ce.min.js" crossorigin="anonymous"></script>
  <script src="/sentry-init.js?v=20260523b"></script>
  <link rel="stylesheet" href="login.css" />
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>
  <main class="login-wrap">
    <a href="/" class="brand">InfinityMade</a>

    <div class="login-card">
      <h1 id="title">Anmelden</h1>
      <p class="sub" id="sub">Willkommen zurück. Geben Sie Ihre Zugangsdaten ein.</p>

      <div class="lang-switch">
        <button data-lang="de" class="active">DE</button>
        <button data-lang="en">EN</button>
        <button data-lang="tr">TR</button>
      </div>

      <form id="loginForm">
        <label id="lbl_email">E-Mail</label>
        <input type="email" id="email" required autocomplete="email" />

        <label id="lbl_pass">Passwort</label>
        <input type="password" id="password" required autocomplete="current-password" />

        <button type="submit" class="btn-primary" id="submitBtn">Anmelden</button>

        <div id="message" class="msg"></div>

        <div class="links">
          <a href="#" id="forgotLink">Passwort vergessen?</a>
        </div>
      </form>

      <div class="register-block">
        <p class="register-text" id="regText">Noch kein Konto?</p>
        <a href="onboarding.html" class="btn-register" id="regBtn">Get Started</a>
      </div>
    </div>

    <p class="back-home"><a href="/" id="backLink">← Zurück zur Startseite</a></p>
  </main>

  <script type="module" src="login.js?v=20260512j"></script>
</body>
</html>
