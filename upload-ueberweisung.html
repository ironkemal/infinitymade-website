<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Überweisung Hochladen - InfinityMade</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .upload-container {
            background: white;
            border-radius: 16px;
            padding: 32px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 8px;
            text-align: center;
        }

        .subtitle {
            color: #6b7280;
            text-align: center;
            margin-bottom: 24px;
            font-size: 14px;
        }

        .upload-area {
            border: 2px dashed #e5e7eb;
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 20px;
        }

        .upload-area:hover {
            border-color: #667eea;
            background: #f9fafb;
        }

        .upload-area.dragover {
            border-color: #667eea;
            background: #eef2ff;
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .upload-text {
            color: #6b7280;
            font-size: 14px;
        }

        .upload-text strong {
            color: #667eea;
        }

        #fileInput {
            display: none;
        }

        .preview-container {
            display: none;
            margin-bottom: 20px;
        }

        .preview-container.show {
            display: block;
        }

        .preview-img {
            width: 100%;
            max-height: 300px;
            object-fit: contain;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
        }

        .btn-upload {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-upload:hover {
            opacity: 0.9;
        }

        .btn-upload:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .status-bar {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
            display: none;
        }

        .status-bar.loading {
            display: block;
            background: #fef3c7;
            color: #92400e;
        }

        .status-bar.success {
            display: block;
            background: #d1fae5;
            color: #065f46;
        }

        .status-bar.error {
            display: block;
            background: #fee2e2;
            color: #991b1b;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .business-id-input {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #374151;
            margin-bottom: 6px;
        }

        .form-input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: #667eea;
        }
    </style>
</head>

<body>
    <div class="upload-container">
        <h1>📋 Überweisung Hochladen</h1>
        <p class="subtitle">Fotografieren Sie Ihre Überweisung und laden Sie sie hoch</p>

        <div class="business-id-input">
            <label class="form-label">Geschäfts-ID (Mandant)</label>
            <input type="text" class="form-input" id="businessId" placeholder="z.B. Ihre UUID oder Geschäftskennung" />
        </div>

        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📷</div>
            <p class="upload-text">
                <strong>Klicken Sie hier</strong> oder ziehen Sie eine Datei hierher<br>
                <small>JPEG, PNG, PDF - Max. 10MB</small>
            </p>
            <input type="file" id="fileInput" accept="image/*,.pdf" />
        </div>

        <div class="preview-container" id="previewContainer">
            <img id="previewImg" class="preview-img" alt="Vorschau" />
        </div>

        <button class="btn-upload" id="uploadBtn" disabled>
            Hochladen & Parsen
        </button>

        <div class="status-bar" id="statusBar"></div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const previewContainer = document.getElementById('previewContainer');
        const previewImg = document.getElementById('previewImg');
        const uploadBtn = document.getElementById('uploadBtn');
        const statusBar = document.getElementById('statusBar');
        const businessIdInput = document.getElementById('businessId');

        let selectedFile = null;

        // Click to upload
        uploadArea.addEventListener('click', () => fileInput.click());

        // Drag and drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length) handleFile(files[0]);
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) handleFile(e.target.files[0]);
        });

        function handleFile(file) {
            // Validate
            const validTypes = ['image/jpeg', 'image/png', 'image/webp', 'application/pdf'];
            if (!validTypes.includes(file.type)) {
                showStatus('Bitte nur JPEG, PNG, WebP oder PDF Dateien hochladen.', 'error');
                return;
            }
            if (file.size > 10 * 1024 * 1024) {
                showStatus('Datei ist zu groß. Max. 10MB erlaubt.', 'error');
                return;
            }

            selectedFile = file;

            // Show preview
            const reader = new FileReader();
            reader.onload = (e) => {
                previewImg.src = e.target.result;
                previewContainer.classList.add('show');
            };
            reader.readAsDataURL(file);

            uploadBtn.disabled = false;
            showStatus('', 'loading');
        }

        uploadBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            const businessId = businessIdInput.value.trim();
            if (!businessId) {
                showStatus('Bitte Geschäfts-ID eingeben.', 'error');
                return;
            }

            uploadBtn.disabled = true;
            showStatus('<span class="spinner"></span>Wird hochgeladen und analysiert...', 'loading');

            const formData = new FormData();
            formData.append('file', selectedFile);
            formData.append('business_id', businessId);

            try {
                // n8n webhook'a gönder
                const response = await fetch('https://n8n.infinitymade.de/webhook/referral-upload', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    showStatus('✓ Überweisung erfolgreich hochgeladen und analysiert! Die Verarbeitung kann einige Sekunden dauern.', 'success');
                    selectedFile = null;
                    previewContainer.classList.remove('show');
                    fileInput.value = '';
                } else {
                    throw new Error('Upload fehlgeschlagen');
                }
            } catch (error) {
                console.error('Upload error:', error);
                showStatus('Fehler beim Hochladen. Bitte erneut versuchen.', 'error');
                uploadBtn.disabled = false;
            }
        });

        function showStatus(message, type) {
            statusBar.innerHTML = message;
            statusBar.className = 'status-bar ' + type;
        }
    </script>
</body>

</html>
