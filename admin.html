<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin – InfinityMade</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="dashboard.css?v=20260511n" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    .admin-kpi-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .admin-kpi { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
    .admin-kpi .label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
    .admin-kpi .value { font-size: 24px; font-weight: 700; color: var(--text-main); margin-top: 6px; }
    .admin-table-wrap { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .admin-filter-bar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .admin-access-denied { display: flex; align-items: center; justify-content: center; height: 100vh; color: var(--text-muted); font-size: 16px; }
  </style>
</head>
<body>
  <div id="loading" class="loading-screen"><div class="spinner"></div></div>
  <div id="app" style="display:none;">
    <header class="topbar">
      <div class="topbar-left"><a href="/" class="brand">InfinityMade</a><span class="biz-name">Super Admin</span></div>
      <div class="topbar-right"><button class="logout-btn" id="logoutBtn">Abmelden</button></div>
    </header>
    <div class="dashboard-layout">
      <aside class="sidebar" id="sidebar">
        <nav>
          <a class="nav-item active" data-panel="overview"><span>📊</span> Übersicht</a>
          <a class="nav-item" data-panel="customers"><span>👥</span> Kunden</a>
          <a class="nav-item" data-panel="bookings"><span>📅</span> Termine</a>
          <a class="nav-item" data-panel="feedbacks"><span>💬</span> Feedback</a>
          <a class="nav-item" href="dashboard.html"><span>🔙</span> Dashboard</a>
        </nav>
      </aside>
      <main class="main-area" id="mainArea">

        <section class="panel active" id="panel-overview">
          <div class="panel-header"><div><h2>Übersicht</h2></div></div>
          <div class="admin-kpi-grid" id="adminKpi"></div>
        </section>

        <section class="panel" id="panel-customers">
          <div class="panel-header"><div><h2>Kunden</h2></div></div>
          <div class="admin-filter-bar">
            <select class="form-select" id="custFilterPlan"><option value="">Alle Pläne</option><option value="starter">Starter</option><option value="professional">Professional</option><option value="klinik">Klinik</option><option value="mitarbeiter">Mitarbeiter</option></select>
            <select class="form-select" id="custFilterStatus"><option value="">Alle Status</option><option value="trial">Trial</option><option value="active">Aktiv</option><option value="past_due">Past Due</option><option value="canceled">Canceled</option></select>
            <input class="search-input" id="custSearch" placeholder="Suchen..." />
          </div>
          <div class="admin-table-wrap">
            <table class="data-table"><thead><tr><th>Name</th><th>Email</th><th>Plan</th><th>Status</th><th>Termine</th><th>Leads</th></tr></thead><tbody id="custTable"></tbody></table>
          </div>
        </section>

        <section class="panel" id="panel-feedbacks">
          <div class="panel-header"><div><h2>Feedback & Bugs</h2></div></div>
          <div class="admin-table-wrap">
            <table class="data-table"><thead><tr><th>Datum</th><th>Kunde</th><th>Typ</th><th>Titel</th><th>Status</th><th>Priorität</th><th>Admin Notiz</th></tr></thead><tbody id="fbAdminTable"></tbody></table>
          </div>
        </section>

      </main>
    </div>
  </div>
  <div id="toastContainer"></div>
  <script type="module" src="admin.js?v=20260511n"></script>
</body>
</html>
