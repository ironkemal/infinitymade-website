<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="googlebot" content="noindex, nofollow" />
  <title>Super Admin — Praxura</title>
  <!-- Sentry error tracking -->
  <script src="https://js-de.sentry-cdn.com/1247311e4965725138bca7ddb32101ce.min.js" crossorigin="anonymous"></script>
  <script src="/sentry-init.js?v=20260523c"></script>
  <link rel="stylesheet" href="login.css" />
  <link rel="stylesheet" href="fonts/inter.css" />
</head>
<body>
  <main class="login-wrap">
    <a href="https://praxura.de" class="brand">Praxura</a>

    <div class="login-card">
      <h1>Super Admin</h1>
      <p class="sub">Eingeschränkter Zugang. Nur autorisierte Administratoren.</p>

      <form id="adminLoginForm">
        <label>E-Mail</label>
        <input type="email" id="email" required autocomplete="email" />

        <label>Passwort</label>
        <input type="password" id="password" required autocomplete="current-password" />

        <button type="submit" class="btn-primary" id="submitBtn">Anmelden</button>

        <div id="message" class="msg"></div>
      </form>
    </div>
  </main>

  <script type="module" src="admin-login.js?v=20260518a"></script>
</body>
</html>
