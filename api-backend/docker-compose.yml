services:
  traefik:
    image: traefik:v3.5
    container_name: traefik
    environment:
      - DOCKER_API_VERSION=1.47
    restart: unless-stopped
    command:
      - --api=false
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.le.acme.tlschallenge=true
      - --certificatesresolvers.le.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
    ports:
      - 80:80
      - 443:443
    volumes:
      - ./letsencrypt:/letsencrypt
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - web

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    environment:
      - N8N_HOST=${DOMAIN}
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://${DOMAIN}/
      - N8N_EDITOR_BASE_URL=https://${DOMAIN}/
      - GENERIC_TIMEZONE=${TZ}
      - TZ=${TZ}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_RUNNERS_ENABLED=true
      - N8N_SECURE_COOKIE=true
    volumes:
      - ./n8n_data:/home/node/.n8n
    labels:
      - traefik.enable=true
      - traefik.http.routers.n8n.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.n8n.entrypoints=websecure
      - traefik.http.routers.n8n.tls=true
      - traefik.http.routers.n8n.tls.certresolver=le 
      - traefik.http.services.n8n.loadbalancer.server.port=5678
    networks:
      - web

  api-proxy:
    image: alpine/socat
    container_name: api-proxy
    command: tcp-listen:3000,fork,reuseaddr tcp-connect:172.17.0.1:3000
    restart: unless-stopped
    labels:
      - traefik.enable=true
      # Match only OUR calendar-api routes — leave /api/v1/* (n8n REST), /rest/* etc. for n8n itself.
      - "traefik.http.routers.api.rule=Host(`${DOMAIN}`) && (PathPrefix(`/api/booking`) || PathPrefix(`/api/calendar`) || PathPrefix(`/api/team`) || PathPrefix(`/api/verify-code`) || PathPrefix(`/api/health`))"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls=true"
      - "traefik.http.routers.api.tls.certresolver=le"
      - "traefik.http.services.api.loadbalancer.server.port=3000"
    networks:
      - web

networks:
  web:
    name: web
