<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Termin Buchen</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #0f1115;
      --card:    #16181d;
      --panel:   #1a1d24;
      --border:  rgba(255,255,255,0.08);
      --text:    #f1f5f9;
      --muted:   #94a3b8;
      --green:   #22c55e;
      --green-bg: rgba(34,197,94,0.10);
      --radius:  12px;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* ── Card ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 100%;
      max-width: 780px;
      display: flex;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 200px;
      flex-shrink: 0;
      padding: 22px 20px;
      border-right: 1px solid var(--border);
      background: var(--panel);
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .biz-avatar {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: var(--green);
      color: #000;
      font-size: 20px;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 14px;
    }
    .biz-owner  { font-size: 13px; color: var(--muted); margin-bottom: 2px; }
    .biz-name   { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
    .biz-meta   { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--muted); margin-bottom: 8px; }
    .biz-meta svg { flex-shrink: 0; }

    .sidebar-divider { height: 1px; background: var(--border); margin: 18px 0; }

    .sel-block { display: none; }
    .sel-block.show { display: block; }
    .sel-label { font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 3px; }
    .sel-val   { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 10px; }

    /* ── Main ── */
    .main {
      flex: 1;
      padding: 22px 22px 18px;
      overflow-y: auto;
      min-width: 0;
    }

    /* ── Steps ── */
    .step { display: none; }
    .step.active { display: block; animation: fadeUp .2s ease; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

    .step-title { font-size: 15px; font-weight: 600; margin-bottom: 18px; }

    .btn-back {
      background: none; border: none; color: var(--muted);
      font-family: inherit; font-size: 13px; cursor: pointer;
      padding: 0; margin-bottom: 18px; display: flex; align-items: center; gap: 6px;
    }
    .btn-back:hover { color: var(--text); }

    /* ── List buttons (employee / service) ── */
    .list-btn {
      display: block; width: 100%;
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 10px; padding: 14px 16px;
      text-align: left; color: var(--text);
      font-family: inherit; cursor: pointer;
      margin-bottom: 10px; transition: border-color .15s;
    }
    .list-btn:hover  { border-color: var(--green); }
    .list-btn.active { border-color: var(--green); background: var(--green-bg); }
    .list-btn-title  { font-size: 15px; font-weight: 600; }
    .list-btn-sub    { font-size: 12px; color: var(--muted); margin-top: 3px; }

    /* ── Calendar layout ── */
    .cal-layout {
      display: grid;
      grid-template-columns: 1fr 210px;
      gap: 24px;
      align-items: start;
    }

    /* Calendar nav */
    .cal-head {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 18px;
    }
    .cal-month { font-size: 16px; font-weight: 700; }
    .cal-month em { font-style: normal; color: var(--green); font-weight: 500; margin-left: 4px; }
    .cal-nav-wrap { display: flex; gap: 6px; }
    .cal-nav-btn {
      width: 28px; height: 28px;
      background: none; border: 1px solid var(--border);
      border-radius: 8px; color: var(--text);
      font-size: 15px; cursor: pointer; font-family: inherit;
      display: flex; align-items: center; justify-content: center;
      transition: border-color .12s;
    }
    .cal-nav-btn:hover { border-color: var(--green); color: var(--green); }

    /* Day-of-week header */
    .cal-dow {
      display: grid; grid-template-columns: repeat(7, 1fr);
      text-align: center; margin-bottom: 6px;
    }
    .cal-dow span { font-size: 11px; font-weight: 600; color: var(--muted); padding: 4px 0; }

    /* Grid */
    .cal-grid {
      display: grid; grid-template-columns: repeat(7, 1fr);
      gap: 3px;
    }
    .cal-cell {
      aspect-ratio: 1;
      display: flex; align-items: center; justify-content: center;
      border-radius: 8px;
      font-size: 13px; font-weight: 500;
      background: none; border: none;
      color: var(--text); font-family: inherit;
      cursor: pointer; transition: background .1s;
      position: relative;
    }
    .cal-cell.avail       { background: var(--panel); }
    .cal-cell.avail:hover { background: rgba(34,197,94,.14); color: var(--green); }
    .cal-cell.today       { box-shadow: inset 0 0 0 2px var(--green); }
    .cal-cell.selected    { background: var(--green) !important; color: #000 !important; font-weight: 700; }
    .cal-cell.has-dot::after {
      content: ''; position: absolute; bottom: 3px; left: 50%; transform: translateX(-50%);
      width: 4px; height: 4px; background: var(--green); border-radius: 50%;
    }
    .cal-cell.selected.has-dot::after { background: #000; }
    .cal-cell.past { color: rgba(255,255,255,0.18); pointer-events: none; }
    .cal-cell.empty { pointer-events: none; }

    /* ── Slots panel ── */
    .slots-panel { min-height: 200px; }
    .slots-day-label {
      font-size: 14px; font-weight: 700;
      margin-bottom: 12px; padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }
    .slot-btn {
      display: flex; align-items: center; gap: 10px;
      width: 100%; padding: 11px 14px;
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text);
      font-family: inherit; font-size: 13px; font-weight: 500;
      cursor: pointer; margin-bottom: 8px;
      transition: border-color .12s; text-align: left;
    }
    .slot-dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; flex-shrink: 0; }
    .slot-btn:hover   { border-color: var(--green); }
    .slot-btn.picked  { background: var(--green); color: #000; border-color: var(--green); }
    .slot-btn.picked .slot-dot { background: #000; }
    .slots-empty { font-size: 12px; color: var(--muted); padding-top: 8px; }

    /* ── Form ── */
    .form-label  { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; font-weight: 500; }
    .form-input  {
      width: 100%; padding: 11px 14px;
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-family: inherit; font-size: 14px;
      margin-bottom: 16px; transition: border-color .12s;
    }
    .form-input:focus { outline: none; border-color: var(--green); }

    /* ── Buttons ── */
    .btn-primary {
      background: var(--green); color: #000; border: none;
      padding: 12px 24px; border-radius: 8px;
      font-family: inherit; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: opacity .15s;
    }
    .btn-primary:disabled { opacity: .4; cursor: not-allowed; }
    .btn-primary:hover:not(:disabled) { opacity: .88; }

    /* ── Schedule nav ── */
    .btn-icon {
      width: 28px; height: 28px; background: none; border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 15px; cursor: pointer;
      font-family: inherit; display: flex; align-items: center; justify-content: center;
      transition: border-color .12s;
    }
    .btn-icon:hover { border-color: var(--green); color: var(--green); }
    .btn-ghost {
      background: none; border: 1px solid var(--border); border-radius: 8px;
      color: var(--muted); font-family: inherit; font-size: 12px; cursor: pointer;
      padding: 5px 10px; transition: border-color .12s, color .12s;
    }
    .btn-ghost:hover { border-color: var(--green); color: var(--green); }
    .slot-card:hover { border-color: var(--green) !important; }

    /* ── Footer row ── */
    .step-footer { margin-top: 24px; display: flex; justify-content: flex-end; }

    /* ── Success ── */
    .success-wrap { text-align: center; padding: 48px 0; }
    .success-icon { font-size: 56px; margin-bottom: 16px; }
    .success-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    .success-sub { font-size: 14px; color: var(--muted); }

    /* ── Responsive ── */
    @media (max-width: 740px) {
      .card { flex-direction: column; }
      .sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--border); }
      .cal-layout { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="card">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="biz-avatar" id="bizAvatar">?</div>
    <div class="biz-owner" id="bizOwner"></div>
    <div class="biz-name"  id="bizName">Laden…</div>

    <div class="biz-meta">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <span id="bizDuration">—</span>
    </div>
    <div class="biz-meta">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15 15 0 0 1 0 20M12 2a15 15 0 0 0 0 20"/></svg>
      <span>Europe/Berlin</span>
    </div>

    <div class="sidebar-divider" id="selDivider" style="display:none;"></div>

    <div class="sel-block" id="selEmpBlock">
      <div class="sel-label">Mitarbeiter</div>
      <div class="sel-val" id="selEmpVal">—</div>
    </div>
    <div class="sel-block" id="selSrvBlock">
      <div class="sel-label">Dienstleistung</div>
      <div class="sel-val" id="selSrvVal">—</div>
    </div>
    <div class="sel-block" id="selDateBlock">
      <div class="sel-label">Termin</div>
      <div class="sel-val" id="selDateVal">—</div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- Step 1: Employee -->
    <div class="step active" id="step-employees">
      <div class="step-title">Person auswählen</div>
      <div id="empList"><div class="slots-empty">Mitarbeiter werden geladen…</div></div>
    </div>

    <!-- Step 2: Service -->
    <div class="step" id="step-services">
      <button class="btn-back" id="backToEmp">&#8592; Zurück</button>
      <div class="step-title">Dienstleistung wählen</div>
      <div id="srvList"></div>
    </div>

    <!-- Step 3: Schedule (dashboard-style) -->
    <div class="step" id="step-datetime">
      <button class="btn-back" id="backToSrv">&#8592; Zurück</button>
      <div class="schedule-header" style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
        <button class="btn-icon" id="bkPrev">&#8249;</button>
        <span class="schedule-title" id="bkDateLabel" style="font-size:15px;font-weight:600;">Termin wählen</span>
        <button class="btn-icon" id="bkNext">&#8250;</button>
        <button class="btn-ghost" id="bkToday" type="button" style="margin-left:auto;font-size:12px;">Heute</button>
      </div>
      <div id="bkSlotsList"></div>
    </div>

    <!-- Step 4: Form -->
    <div class="step" id="step-form">
      <button class="btn-back" id="backToCal">&#8592; Zurück</button>
      <div class="step-title">Ihre Kontaktdaten</div>
      <form id="bookingForm">
        <label class="form-label">Vollständiger Name</label>
        <input class="form-input" id="custName" type="text" required />
        <label class="form-label">E-Mail Adresse</label>
        <input class="form-input" id="custEmail" type="email" required />
        <label class="form-label">Telefonnummer</label>
        <input class="form-input" id="custPhone" type="tel" required />
        <div class="step-footer">
          <button class="btn-primary" type="submit">Termin verbindlich buchen</button>
        </div>
      </form>
    </div>

    <!-- Step 5: Success -->
    <div class="step" id="step-success">
      <div class="success-wrap">
        <div class="success-icon">✅</div>
        <div class="success-title">Termin bestätigt!</div>
        <div class="success-sub">Wir freuen uns auf Sie. Eine Bestätigung wird in Kürze gesendet.</div>
      </div>
    </div>

  </main>
</div>

<script type="module" src="booking.js?v=20260512c"></script>
</body>
</html>
